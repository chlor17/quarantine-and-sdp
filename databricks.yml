bundle:
  name: quarantine-and-sdp-pipeline

include:
  - resources/*.yml

variables:
  catalog:
    description: "Unity Catalog name"
    default: your_catalog

  schema:
    description: "Schema name for pipeline tables"
    default: your_schema

  volume_full:
    description: "Volume name for full load data"
    default: parquet_full

  volume_partial:
    description: "Volume name for partial/incremental load data"
    default: parquet_partial

  bronze_table:
    description: "Bronze table name"
    default: bronze_table

  quarantine_table:
    description: "Quarantine table name"
    default: quarantine_table

  dead_letter_table:
    description: "Dead letter table name"
    default: dead_letter_table

  silver_table:
    description: "Silver table name"
    default: silver_table

targets:
  # Demo environment
  demo:
    default: true
    mode: development
    workspace:
      profile: DEFAULT
      root_path: /Workspace/Users/${workspace.current_user.userName}/quarantine-sdp-demo
    variables:
      catalog: your_catalog
      schema: your_schema

  # Development environment
  dev:
    mode: development
    workspace:
      profile: DEFAULT
    variables:
      catalog: your_catalog
      schema: your_schema_dev

  # Production environment
  prod:
    mode: production
    workspace:
      profile: DEFAULT
    variables:
      catalog: your_catalog
      schema: your_schema

# Sync configuration for deployment
sync:
  include:
    - "src/**/*.py"
    - "config.yaml"
    - "requirements.txt"
  exclude:
    - ".git/**"
    - "archive/**"
    - "*.pyc"
    - "__pycache__/**"
    - ".venv/**"
    - ".pytest_cache/**"
